<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="container">
                <h1 class="logo">陈绎然</h1>
                <ul class="nav-links">
                    <li><a href="#about">关于我</a></li>
                    <li><a href="#portfolio">作品集</a></li>
                    <li><a href="#contact">联系方式</a></li>
                </ul>
            </div>

    <main>
        <!-- 关于我部分 -->
        <section id="about" class="section">
            <div class="container">
                <h2>关于我</h2>
                <div class="about-content">
                    <div class="profile-image">
                        <img src="images/profile.jpg" alt="个人照片">
                    </div>
                    <div class="about-text">
                        <h3>你好，我是陈绎然</h3>
                        <p>欢迎来到我的个人主页。</p>
                        <p>这里展示了我的作品集，欢迎浏览。</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- 作品集部分 -->
        <section id="portfolio" class="section">
            <div class="container">
                <h2>作品集</h2>
                <div class="portfolio-single">
                    <div class="portfolio-item">
                        <img src="images/陈绎然-作品集-AIGC.png" alt="陈绎然作品集">
                    </div>
                </div>
            </div>
        </section>

        <!-- 联系方式部分 -->
        <section id="contact" class="section">
            <div class="container">
                <h2>联系方式</h2>
                <div class="contact-content">
                    <p>如果你想与我联系，可以通过以下方式：</p>
                    <ul class="contact-list">
                        <li>� 电话：15997806206</li>
                        <li>� 微信：15997806206</li>
                    </ul>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 陈绎然. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
